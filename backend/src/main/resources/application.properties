spring.application.name=InventoryMgtSystem
server.port=5050

#MYSQL CONNECTION (Use environment variables in production)
spring.datasource.url=jdbc:mysql://localhost:3306/inventory_db
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:changeme_in_production}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update


#THE MAXIMUM SIGN OF IMAGE THAT CAN BE UPLOADED
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB

#JWT Secret - MUST be changed in production! Use a strong random string (at least 256 bits for HS256)
secreteJwtString=${JWT_SECRET:CHANGE_THIS_TO_A_STRONG_RANDOM_SECRET_IN_PRODUCTION_MIN_32_CHARS}

#MINIO CONFIGURATION (Local S3-compatible storage)
#MinIO runs on port 9000 by default
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:changeme_in_production}
minio.secret-key=${MINIO_SECRET_KEY:changeme_in_production}
minio.bucket-name=product-images

#Local file storage directory (fallback if MinIO not available)
local.storage.directory=/tmp/minio-storage/product-images/
